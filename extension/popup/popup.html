<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      width: 320px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      margin: 0;
      padding: 12px;
      background: linear-gradient(180deg, #faf5ff 0%, #fdf2f8 100%);
      color: #374151;
    }
    h2 {
      margin: 0 0 10px 0;
      font-size: 16px;
      background: linear-gradient(90deg, #9333ea, #db2777);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .field { margin-bottom: 10px; }
    .field label { display: block; margin-bottom: 4px; color: #6b7280; font-size: 12px; }
    .field input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #e9d5ff;
      border-radius: 8px;
      font-size: 13px;
    }
    .field input:focus { outline: none; border-color: #a855f7; }
    button {
      width: 100%;
      padding: 10px 16px;
      margin-top: 8px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      background: linear-gradient(90deg, #9333ea, #db2777);
      color: white;
      box-shadow: 0 4px 14px rgba(147, 51, 234, 0.35);
    }
    button:hover { opacity: 0.95; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .status { margin-top: 10px; padding: 8px; border-radius: 8px; font-size: 12px; }
    .status.info { background: #ede9fe; color: #5b21b6; }
    .status.error { background: #fee2e2; color: #b91c1c; }
    .status.success { background: #d1fae5; color: #065f46; }
    .hint { font-size: 11px; color: #9ca3af; margin-top: 4px; }
  </style>
</head>
<body>
  <h2>CRM Anunțuri</h2>
  <div class="field">
    <label>URL Dashboard CRM</label>
    <input type="text" id="apiBase" placeholder="https://example.com sau http://localhost:3000" />
    <div class="hint">Pagina unde rulează aplicația (pentru trimitere anunț).</div>
  </div>
  <button id="btnScrape">Adaugă anunțul în CRM</button>
  <div id="status" class="status info" style="display:none;"></div>
  <script src="popup.js"></script>
</body>
</html>
